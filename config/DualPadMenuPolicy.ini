; DualPad 菜单上下文策略
; unknown_menu_policy:
;   passthrough = 未知菜单默认不抢上下文，适合正式游玩
;   track       = 未知菜单默认进入 generic Menu，适合排查问题

[Policy]
unknown_menu_policy = passthrough
log_unknown_menu_probe = true
log_unknown_menu_decision = true

[Track]
; 示例：把某个未知菜单显式映射到目标上下文
; BTPS Menu = Menu
; BestiaryWidget = JournalMenu

[Ignore]
HUD Menu = true
Fader Menu = true
Cursor Menu = true
Mist Menu = true
Tutorial Menu = true
LoadWaitSpinner = true
TrueHUD = true
STBActiveEffects = true
resistWidget = true
goldWidget = true
weightWidget = true
equipWidget_STB = true
shoutWidget = true
lvlWidget = true
playtimeWidget = true
gametimeWidget = true
