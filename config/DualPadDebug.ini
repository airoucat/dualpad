; DualPad runtime/debug toggles.
; This file is optional. Missing values fall back to safe defaults.

[Logging]
log_input_packets = false
log_input_hex = false
log_input_state = false
log_mapping_events = false
log_synthetic_state = false
log_action_plan = false
log_native_injection = true
log_keyboard_injection = false
log_sprint_observation = false

[Injection]
; Official runtime path: patch the internal XInputGetState call inside
; BSWin32GamepadDevice::Poll on Skyrim SE 1.5.97.
; Rollback is simply setting this back to false.
use_upstream_gamepad_hook = false
; disabled | poll-xinput-call
upstream_gamepad_hook_mode = poll-xinput-call
; Observe-only reverse probe: patch the Orbis producer-side provider read call
; inside BSPCOrbisGamepadDevice::Poll and log the current-state block when hit.
; This does not inject state; it only confirms whether the Orbis path is active.
use_orbis_gamepad_probe_hook = true
; Observe-only reverse probe: patch the gamepad device factory branch/call sites
; and log whether Skyrim created BSWin32GamepadDevice or BSPCOrbisGamepadDevice.
use_gamepad_device_creation_probe_hook = true
; Experimental reverse probe: patch only the factory's internal
; XInputGetCapabilities call-site and force DEVICE_NOT_CONNECTED so the
; runtime can be tested for Orbis/provider fallback without touching Poll.
force_factory_xinput_capabilities_fail = false

; Experimental keyboard route: patch the post-event semantic boundary inside
; BSWin32KeyboardDevice::Poll and probe control-only keyboard injection.
; This is currently reverse-engineering scaffolding, not the production route
; for gameplay actions.
; Rollback is simply setting this back to false.
use_upstream_keyboard_hook = false
; semantic-mid | diobjdata-call
upstream_keyboard_hook_mode = diobjdata-call
; Reverse-engineering test: overwrite dispatch event +0x18 with the expected
; global source object at sub_140C15E00 entry. Keep off by default.
test_keyboard_event_source_patch = false
; Reverse-engineering test: temporarily write qword_142F50B28+0x380/currentHead
; before sub_140C15E00 to verify the manager-head hypothesis. Keep off by default.
test_keyboard_manager_head_patch = false
; Reverse-engineering test: temporarily route Menu.Confirm through KeyboardNative
; so one-shot Native/Synthetic Accept template dumps can be captured.
test_keyboard_accept_dump_route = false

; Deprecated experimental consumer-side native button path.
; Keep this off unless you are reproducing old reverse-engineering failures on purpose.
use_native_button_injector = true
; drop = install the Poll+0x53 call hook but discard staged native buttons.
; append-probe = keep native button staging, log queue/head state at the call-site, then discard before AddButtonEvent.
; append = stage native buttons through BSInputEventQueue::AddButtonEvent/PushOntoInputQueue at the call-site.
; engine-cache = append staged button events through the game's own queue-cache helper before ControlMap.
; head-prepend = prepend heap ButtonEvent nodes only onto the current ControlMap head argument, without touching queue fields.
; inject = prepend staged native buttons into the independent input queue singleton before ControlMap.
native_button_hook_mode = engine-cache
; Experimental fallback only. Native frame mode still uses BSInputEventQueue for axes.
use_native_frame_injector = false
