; DualPad runtime/debug toggles.
; This file is optional. Missing values fall back to safe defaults.

[Logging]
log_input_packets = false
log_input_hex = false
log_input_state = false
log_mapping_events = false
log_synthetic_state = false
log_action_plan = false
log_native_injection = false
log_keyboard_injection = false

[Injection]
; Official runtime path: patch the internal XInputGetState call inside
; BSWin32GamepadDevice::Poll on Skyrim SE 1.5.97.
; Rollback is simply setting this back to false.
use_upstream_gamepad_hook = true
; disabled | poll-xinput-call
upstream_gamepad_hook_mode = poll-xinput-call
; When a source button is claimed by a DualPad binding, do not let it fall
; back into unmanaged raw publish.
enable_fail_closed_source_isolation = true
; Treat coalesced snapshots as degraded delivery so overflow compensation and
; diagnostics kick in even when the queue did not physically overflow.
treat_coalesced_snapshot_as_overflow = true

[Features]
; combo-native Pause / NativeScreenshot stay enabled independently.
; Hotkey3-8 stay behind an explicit runtime gate until they receive
; dedicated in-game verification.
enable_combo_native_hotkeys3_to_8 = false
; Temporary debug helper: opens a vanilla tutorial/help prompt so glyph styling
; can be checked quickly without waiting for a naturally-triggered tutorial.
enable_tutorial_debug_hotkey = true
; Raw DIK scancode. Default 0x44 = F10.
tutorial_debug_hotkey_scancode = 0x44
